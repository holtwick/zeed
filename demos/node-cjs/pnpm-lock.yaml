lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      zeed:
        specifier: file:../..
        version: file:../..

packages:

  zeed@file:../..:
    resolution: {directory: ../.., type: directory}
    name: zeed
    engines: {node: '>=18'}

snapshots:

  zeed@file:../..: {}
